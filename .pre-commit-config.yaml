---
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
# cspell:ignore autofix shellcheck shfmt yamlfmt gitleaks unattend scrollback checkmake actionlint zizmor github gitmodules oxipng mdformat mkdocs justfile
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      # If you attempt to add or update a file that is larger than 50 MiB, you
      # will receive a warning from Git.
      # GitHub blocks files larger than 100 MiB.
      #
      # https://docs.github.com/en/repositories/working-with-files/managing-large-files/about-large-files-on-github#file-size-limits
      - id: check-added-large-files
      # non-default
      - id: check-case-conflict
      - id: check-executables-have-shebangs
        exclude: |
          (?x)^(
              .*\.ps1|
              path/to/file\.py
          )$
      - id: check-json
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable
      - id: check-symlinks
      - id: check-toml
      - id: check-xml
      - id: detect-private-key
      - id: mixed-line-ending
      - id: pretty-format-json
        args: ["--autofix"]
      # Added 2025-01
      - id: check-illegal-windows-names
      - id: debug-statements
        #- id: file-contents-sorter
        #- id: no-commit-to-branch
  - repo: https://github.com/amperser/proselint
    rev: v0.16.0
    hooks:
      - id: proselint
        args: ["check"]
        types: ["asciidoc", "file", "non-executable", "plain-text", "text"]
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
        args: ["--no-banner"]
  - repo: https://github.com/google/yamlfmt
    rev: v0.21.0
    hooks:
      - id: yamlfmt
        args: ["-formatter", "include_document_start=true,scan_folded_as_literal=true"]
  - repo: https://github.com/hukkin/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        name: mdformat (GFM for non-mkdocs)
        args: ["--check", "--number"]
        additional_dependencies:
          - mdformat-gfm
          - mdformat-toc
  # Requires just to be installed on the system.
  - repo: https://github.com/instrumentl/pre-commit-just
    rev: v0.1
    hooks:
      - id: format-justfile
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.11.0
    hooks:
      - id: shellcheck
        args: ["--color=always", "--external-sources"]
        types: ["executable", "file", "shell", "text"]
        exclude: |
          (?x)^(
              .*\.ps1|
              path/to/file\.py
          )$
  - repo: https://github.com/mrtazz/checkmake
    rev: v0.3.2
    hooks:
      - id: checkmake
  - repo: https://github.com/oxipng/oxipng
    rev: v10.1.0
    hooks:
      - id: oxipng
        args: ["-o", "4", "--strip", "safe", "--alpha"]
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.11
    hooks:
      - id: actionlint
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.12.0-2
    hooks:
      - id: shfmt
        args: ["--diff", "--indent", "2", "--binary-next-line", "--space-redirects", "--case-indent"]
        types: ["executable", "file", "shell", "text"]
        exclude: |
          (?x)^(
              path/to/file\.py
          )$
  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.22.0
    hooks:
      - id: zizmor
        files: ^\.github/workflows/.*\.ya?ml$
  # Takes long, therefore always comes last.
  - repo: https://github.com/streetsidesoftware/cspell-cli
    rev: v9.7.0
    hooks:
      - id: cspell
        additional_dependencies:
          - "@cspell/dict-de-de"
          - "@cspell/dict-vim"
          - "@cspell/dict-win32"
        args:
          - "--locale"
          - "en,en-US,de-DE"
          - "--no-progress"
          - "--no-summary"
          # Include files and directories starting with '.' when matching
          # globs.
          - "--dot"
          # Show the surrounding text around an issue.
          - "--show-context"
          # Ignore files matching glob patterns found in .gitignore files.
          #- "--gitignore"
          # For easier adding of words to dictionaries.
          #- "--words-only"
          #- "--unique"
          # This might eventually be useful for some tricky issues.
          #- "--verbose"
          #- "--no-cache"
          #- "--cache-reset"
          # Not useful at all unless you are prepared to filter JSON output
          # longer than your scrollback buffer.
          #- "--debug"
        types: ["file", "text"]
        exclude: |
          (?x)^(
              \.gitignore|
              \.gitmodules|
              \.proselintrc\.json|
              .*\.cast|
              .*\.ini|
              .*\.json|
              .*\.ps1|
              .*\.svg|
              path/to/file\.py
          )$
